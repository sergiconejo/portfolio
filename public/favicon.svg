<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    :root { --fg: #000000; --bg: #ffffff; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #ffffff; --bg: #000000; }
    }
  </style>
  <rect width="64" height="64" rx="12" fill="var(--bg)"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-size="40" font-family="system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif"
        fill="var(--fg)">S</text>
</svg>
